<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kaelig - A modern game discovery platform. Browse trending, popular, upcoming, and newly released games. Track your favorites, wishlist, and gaming progress." />
    <meta name="theme-color" content="#0f1115" />
    <meta name="color-scheme" content="dark light" />

    <meta property="og:title" content="Kaelig - Game Discovery Platform" />
    <meta property="og:description" content="Discover your next favorite game. Browse trending, popular, and upcoming titles." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kaelig - Game Discovery Platform" />
    <meta name="twitter:description" content="Discover your next favorite game. Browse trending, popular, and upcoming titles." />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://api.rawg.io" />
    <link rel="preconnect" href="https://images.igdb.com" crossorigin />

    <title>Kaelig - Game Discovery Platform</title>
    <script>
      (function() {
        var stored = localStorage.getItem('kaelig-theme');
        var theme;
        if (stored === 'dark' || stored === 'light') {
          theme = stored;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.classList.add(theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
          meta.setAttribute('content', theme === 'light' ? '#f8fafc' : '#0f1115');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
